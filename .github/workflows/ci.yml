name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # The engines floor in package.json; the app is developed on newer
          # majors, so CI guards the oldest version we claim to support.
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Typecheck server
        run: npx tsc -p server/tsconfig.json
      - name: Build client
        run: npm run build -w client
