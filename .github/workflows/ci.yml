name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:      # republish the image without a new commit

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # The engines floor in package.json; the app is developed on newer
          # majors, so CI guards the oldest version we claim to support.
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Typecheck server
        run: npx tsc -p server/tsconfig.json
      - name: Build client
        run: npm run build -w client

  publish:
    # Ships the runnable image to GHCR so deployments pull it instead of
    # building on the server (see DEPLOY.md). Master only, tests first.
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3      # arm64 is built under emulation
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 for t3/x86 hosts, arm64 for Graviton (t4g) and Raspberry Pi.
          # Drop arm64 if the emulated client build gets too slow.
          platforms: linux/amd64,linux/arm64
          push: true
          # The version tag is re-pushed on every master commit — the version in
          # package.json marks the release, not each individual change. `sha-…`
          # is the immutable handle to roll back to.
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.pkg.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
