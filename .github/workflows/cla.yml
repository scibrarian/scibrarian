name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Explicit permissions so the bot can record signatures even when the repo's
# default GITHUB_TOKEN workflow permissions are read-only.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/scibrarian/scibrarian/blob/master/CLA.md'
          # Branch where the signatures file is stored/committed.
          branch: 'master'
          # Contributors who never need to sign (maintainer + bots).
          allowlist: anthonysalvato3,dependabot[bot],bot*
